<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    display: flex;
    background: #f4f6fb;
}

/* SIDEBAR */
.sidebar {
    width: 250px;
    background: linear-gradient(180deg, #1e3c72, #2a5298);
    color: white;
    height: 100vh;
    padding: 20px;
    display: flex;
    flex-direction: column;
}

.sidebar h2 {
    text-align: center;
}

.sidebar button {
    margin-top: 15px;
    padding: 10px;
    border: none;
    cursor: pointer;
    border-radius: 6px;
}

.logout {
    margin-top: auto;
    background: red;
    color: white;
}

/* MAIN */
.main {
    flex: 1;
    padding: 20px;
}

.topbar {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
}

.task-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    border-left: 5px solid #2a5298;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

.card h3 {
    margin: 0;
    color: #1e3c72;
}

.card p {
    font-size: 14px;
    color: #555;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>📘 Student Panel</h2>

    <button onclick="loadTasks()">📚 My Assignments</button>

    <button class="logout" onclick="logout()">🚪 Logout</button>
</div>

<!-- MAIN -->
<div class="main">

    <div class="topbar">
        <h2>Welcome Student</h2>
    </div>

    <div id="taskList" class="task-grid"></div>

</div>

<script>
const API = "http://localhost:5000";

/* ================= LOAD TASKS ================= */
async function loadTasks() {

    const studentClass = localStorage.getItem("studentClass");

    try {
        const res = await fetch(`${API}/tasks?class=${studentClass}`);
        const data = await res.json();

        const container = document.getElementById("taskList");
        container.innerHTML = "";

        if (!data || data.length === 0) {
            container.innerHTML = "<p>No tasks yet</p>";
            return;
        }

        data.forEach(task => {
            container.innerHTML += `
                <div class="card">
                    <h3>${task.title || ""}</h3>
                    <p>${task.description || ""}</p>

                    ${task.file_path ? `
                        <a href="http://127.0.0.1:5000/uploads/${task.file_path}" target="_blank">
                            📥 Download File
                        </a>
                        <br><br>
                    ` : ""}

                    <textarea id="answer-${task.id}" placeholder="Write answer"></textarea><br>

                    <input type="file" id="file-${task.id}" /><br><br>

                    <button onclick="submitTask(${task.id})">
                        📤 Submit Work
                    </button>
                </div>
            `;
        });

    } catch (err) {
        console.error(err);
        document.getElementById("taskList").innerHTML =
            "<p style='color:red'>Failed to load tasks</p>";
    }
}
async function submitTask(taskId) {
    const formData = new FormData();

    formData.append("task_id", taskId);
    formData.append("answer", document.getElementById(`answer-${taskId}`).value);

    const fileInput = document.getElementById(`file-${taskId}`);
    if (fileInput.files[0]) {
        formData.append("file", fileInput.files[0]);
    }

    const res = await fetch(`${API}/submit-task`, {
        method: "POST",
        headers: {
            Authorization: "Bearer " + localStorage.getItem("token")
        },
        body: formData
    });

    const data = await res.json();
    alert(data.msg);
}

/* ================= LOGOUT ================= */
function logout() {
    localStorage.clear();
    window.location.href = "index.html";
}

async function studentLogin() {
  const emailInput = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const email = emailInput.trim().toLowerCase(); // 🔥 IMPORTANT

  try {
    const res = await fetch("http://127.0.0.1:5000/student-login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (data.success) {
      localStorage.setItem("token", data.token);
      localStorage.setItem("role", "student");

      window.location.href = "student-dashboard.html";
    } else {
      alert(data.msg);
    }

  } catch (err) {
    console.error(err);
    alert("Server error");
  }
}

/* AUTO LOAD ON PAGE OPEN */
loadTasks();
</script>

</body>
</html>
