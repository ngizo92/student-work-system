<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    display: flex;
    background: #f4f6fb;
}

.sidebar {
    width: 250px;
    background: linear-gradient(180deg, #1e3c72, #2a5298);
    color: white;
    height: 100vh;
    padding: 20px;
    display: flex;
    flex-direction: column;
}

.sidebar h2 {
    text-align: center;
}

.sidebar button {
    margin-top: 15px;
    padding: 10px;
    border: none;
    cursor: pointer;
    border-radius: 6px;
}

.logout {
    margin-top: auto;
    background: red;
    color: white;
}

.main {
    flex: 1;
    padding: 20px;
}

.topbar {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
}

.task-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    border-left: 5px solid #2a5298;
}

.card h3 {
    margin: 0;
    color: #1e3c72;
}

.card p {
    font-size: 14px;
    color: #555;
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>📘 Student Panel</h2>

    <button onclick="loadTasks()">📚 My Assignments</button>

    <button class="logout" onclick="logout()">🚪 Logout</button>
</div>

<div class="main">

    <div class="topbar">
        <h2>Welcome Student</h2>
    </div>

  <div style="margin-bottom:15px;">
    <button onclick="showSection('undone')">⏳ Undone Works</button>
    <button onclick="showSection('done')">✅ Done Works</button>
</div>

<div id="undoneList" class="task-grid"></div>
<div id="doneList" class="task-grid" style="display:none;"></div>
</div>

<script>
const API = "http://localhost:5000";

/* ================= LOAD TASKS ================= */
async function loadTasks() {

    const studentClass = localStorage.getItem("studentClass");
const res = await fetch(`${API}/student-submissions`, {
    headers: {
        Authorization: "Bearer " + localStorage.getItem("token")
    }
});
    const data = await res.json();

  const undoneContainer = document.getElementById("undoneList");
const doneContainer = document.getElementById("doneList");

undoneContainer.innerHTML = "";
doneContainer.innerHTML = "";

    data.forEach(task => {

        const deadline = new Date(task.deadline);
        const now = new Date();

        if (task.deadline && now > deadline) return;

        const diff = deadline - now;
        const hours = Math.floor(diff / (1000 * 60 * 60));
        const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));

       const isDone = task.submission_id != null;

const cardHTML = `
    <div class="card">
        <h3>${task.title}</h3>
        <p>${task.description || ""}</p>

        ${task.deadline ? `<p><b>Deadline:</b> ${task.deadline}</p>` : ""}

        ${task.file_path ? `
            <a href="${API}/uploads/${task.file_path}" target="_blank">
                📥 Download File
            </a><br><br>
        ` : ""}

        ${
          !isDone ? `
            <textarea id="answer-${task.id}" placeholder="Write answer"></textarea><br>
            <input type="file" id="file-${task.id}" /><br><br>
            <button onclick="submitTask(${task.id})">📤 Submit Work</button>
          ` : ""
        }

   ${
  isDone ? `
    <p><b>Marks:</b> ${task.marks}</p>
    <p><b>Feedback:</b> ${task.feedback || "No feedback"}</p>

    <button onclick="deleteSubmission(${task.submission_id || task.id})"
        style="background:red;color:white;padding:5px;margin-top:8px;">
        🗑 Delete
    </button>
  ` : ``
}
`;
if (isDone) {
    doneContainer.innerHTML += cardHTML;
} else {
    undoneContainer.innerHTML += cardHTML;
}
    });
      if (!undoneContainer.innerHTML) {
        undoneContainer.innerHTML = "<p>No pending work 🎉</p>";
    }

    if (!doneContainer.innerHTML) {
        doneContainer.innerHTML = "<p>No completed work yet</p>";
    }
}


/* ================= SUBMIT ================= */
async function submitTask(taskId) {

    const formData = new FormData();
    formData.append("task_id", taskId);
    formData.append("answer", document.getElementById(`answer-${taskId}`).value);

    const fileInput = document.getElementById(`file-${taskId}`);
    if (fileInput.files[0]) {
        formData.append("file", fileInput.files[0]);
    }

    const res = await fetch(`${API}/submit-task`, {
        method: "POST",
        headers: {
            Authorization: "Bearer " + localStorage.getItem("token")
        },
        body: formData
    });

    const data = await res.json();
    alert(data.msg);
}

loadTasks();

function showSection(type) {
    const undone = document.getElementById("undoneList");
    const done = document.getElementById("doneList");

    if (type === "undone") {
        undone.style.display = "grid";
        done.style.display = "none";
    } else {
        undone.style.display = "none";
        done.style.display = "grid";
    }
}

/* ================= LOGOUT ================= */
function logout() {
    localStorage.clear();
    window.location.href = "index.html";
}

async function deleteSubmission(id) {

    if (!confirm("Are you sure you want to delete this submission?")) return;

    const res = await fetch(`${API}/delete-submission/${id}`, {
        method: "DELETE",
        headers: {
            Authorization: "Bearer " + localStorage.getItem("token")
        }
    });

    const data = await res.json();

    alert(data.msg);

    if (data.success) {
    loadTasks();
    showSection('done'); // 🔥 THIS is what refreshes UI
    }
}
/* AUTO LOAD */
loadTasks();
showSection('undone'); // default view
</script>

</body>
</html>
