<!DOCTYPE html>
<html>
<head>
  <title>STUDENT-WORK-SYSTEM</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>STUDENT-WORK-SYSTEM</h1>

  <!-- STUDENT LOGIN -->
  <div class="card">
    <h2>Student Login</h2>
    <input id="student_email" placeholder="Email">
    <input id="student_password" type="password" placeholder="Password">
    <button onclick="studentLogin()">Login as Student</button>
  </div>

  <!-- TEACHER LOGIN -->
  <div class="card">
    <h2>Teacher Login</h2>
    <input id="teacher_email" placeholder="Email">
    <input id="teacher_password" type="password" placeholder="Password">
    <button onclick="teacherLogin()">Login as Teacher</button>
  </div>

  <!-- CREATE TEACHER -->
  <button class="primary" onclick="openPopup()">
    Create Teacher Account
  </button>

</div>

<!-- POPUP -->
<div id="teacherPopup" class="popup">
  <div class="popup-box">

    <h2>Create Teacher Account</h2>

    <input id="t_name" placeholder="Name">
    <input id="t_email_reg" placeholder="Email">
    <input id="t_password_reg" type="password" placeholder="Password">

    <button onclick="createTeacher()">Create</button>
    <button onclick="closePopup()">Close</button>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
