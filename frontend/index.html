<!DOCTYPE html>
<html>
<head>
  <title>STUDENT-WORK-SYSTEM</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<div class="hero">

  <img src="images/sws-logo.png" alt="logo">

  <h1>STUDENT-WORK-SYSTEM</h1>

  <p>
    Organized, efficient, reliable system for managing student tasks, assignments, schedules, collaboration, progress tracking, productivity, learning support, deadlines, and academic workflow management.
  </p>

</div>

<!-- CHOOSE ENTITY BUTTON -->
<div class="entity-container">

  <button class="choose-btn" onclick="showEntities()">
    Choose an Entity
  </button>

  <!-- ROLE OPTIONS (hidden initially) -->
  <div id="entityOptions" class="entity-options" style="display:none;">

    <button class="role-btn student" onclick="goStudent()">
      👨‍🎓 Student
    </button>

    <button class="role-btn teacher" onclick="goTeacher()">
      👨‍🏫 Teacher
    </button>

   <button class="role-btn dos" onclick="openDosLogin()">
  👑 DOS
</button>

  </div>

<div>

  <!-- CREATE TEACHER -->
  <button class="primary" onclick="openDosRegister()">
  👑 Create DOS Account
</button>

</div>

<!-- POPUP -->
<div id="teacherPopup" class="popup">
  <div class="popup-box">

    <h2>Create Teacher Account</h2>

    <input id="t_name" placeholder="Name">
    <input id="t_email_reg" placeholder="Email">
    <input id="t_password_reg" type="password" placeholder="Password">

    <button onclick="createTeacher()">Create</button>
    <button onclick="closePopup()">Close</button>

  </div>
</div>



<!-- ================= DOS LOGIN MODAL ================= -->
<div id="dosModal" class="modal">

  <div class="modal-box">

    <h2>👑 DOS Login</h2>
    <p class="subtitle">Access administrative dashboard</p>

    <input id="dos_email" type="email" placeholder="Email">
    <input id="dos_password" type="password" placeholder="Password">

    <button onclick="dosLogin()">Login</button>
    <button class="close-btn" onclick="closeDosLogin()">Cancel</button>

  </div>

</div>
<script src="script.js"></script>
</body>
</html>
