<!DOCTYPE html>
<html>
<head>
  <title>DOS Register</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      padding: 30px;
      border-radius: 16px;
      width: 320px;
      color: white;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    h2 {
      text-align: center;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      border: none;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    .create {
      background: #2a5298;
      color: white;
    }

    .cancel {
      background: #e74c3c;
      color: white;
    }
  </style>
</head>

<body>

<div class="box">

  <h2>👑 DOS Register</h2>

  <input id="dos_name" placeholder="Name">
  <input id="dos_email" placeholder="Email">
  <input id="dos_password" type="password" placeholder="Password">

  <button class="create" onclick="createDos()">Create Account</button>
  <button class="cancel" onclick="goBack()">Cancel</button>

</div>

<script>
const API = "http://localhost:5000";

async function createDos() {

  const name = document.getElementById("dos_name").value;
  const email = document.getElementById("dos_email").value;
  const password = document.getElementById("dos_password").value;

  const res = await fetch(`${API}/dos-register`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name, email, password })
  });

  const data = await res.json();

  alert(data.msg);

  if (data.success) {
    window.location.href = "dos-login.html";
  }
}

function goBack() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
