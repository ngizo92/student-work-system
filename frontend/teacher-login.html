<!DOCTYPE html>
<html>
<head>
    <title>Teacher Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-container">
    <div class="card">
     <h2>Teacher Login</h2>

<form id="loginForm">

    <input type="email" id="teacher_email" placeholder="Email" required>

    <div style="position: relative;">
        <input id="teacher_password" type="password" placeholder="Password" required minlength="4">

        <span onclick="togglePassword()"
              style="position:absolute; right:10px; top:8px; cursor:pointer;">
              👁
        </span>
    </div>

    <button type="submit">Login</button>
</form>

<a href="teacher-register.html">Create TR Account</a>
    </div>
</div>

<script src="script.js"></script>

<!-- ✅ ADD THIS SCRIPT -->
<script>
document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const email = document.getElementById("teacher_email").value.trim();
    const password = document.getElementById("teacher_password").value.trim();

    if (!email || !password) {
        alert("All fields are required");
        return;
    }

    if (!email.includes("@")) {
        alert("Enter a valid email");
        return;
    }

    if (password.length < 4) {
        alert("Password must be at least 4 characters");
        return;
    }

    teacherLogin(); // from script.js
});

// PASSWORD TOGGLE
function togglePassword() {
    const pass = document.getElementById("teacher_password");
    pass.type = pass.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
