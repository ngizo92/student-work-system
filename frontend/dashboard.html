<!DOCTYPE html>
<html>
<head>
<title>Teacher Dashboard</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6fb;
    display: flex;
}

.nav {
    width: 220px;
    height: 100vh;
    background: linear-gradient(180deg, #1e3c72, #2a5298);
    color: white;
    display: flex;
    flex-direction: column;
    padding: 20px;
}

.nav h3 {
    text-align: center;
    margin-bottom: 30px;
}

.nav button {
    background: white;
    color: #1e3c72;
    border: none;
    padding: 10px;
    margin-top: 10px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}

.container {
    flex: 1;
    padding: 25px;
}

form {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
}

input, textarea, select {
    padding: 10px;
    margin: 5px;
    width: 220px;
    border: 1px solid #ccc;
    border-radius: 6px;
}

button {
    padding: 10px;
    margin: 5px;
    cursor: pointer;
    border: none;
    border-radius: 6px;
    background: #2a5298;
    color: white;
}

.task-card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    border-left: 5px solid #2a5298;
    margin-top: 10px;
}

.high { color: red; font-weight: bold; }
.medium { color: orange; }
.low { color: green; }

</style>
</head>

<body>

<div class="nav">
    <h3>Teacher Panel</h3>
    <button onclick="logout()">Logout</button>
</div>

<div class="container">

<h3>Create Task</h3>

<form id="taskForm">
  <input type="text" id="title" placeholder="Title" required />
  <textarea id="description" placeholder="Description"></textarea>
  <input type="text" id="class" placeholder="Class" required />
  <input type="text" id="subject" placeholder="Subject" required />
  <input type="file" id="file" />

  <select id="priority">
    <option value="low">Low</option>
    <option value="medium">Medium</option>
    <option value="high">High</option>
  </select>

  <input type="datetime-local" id="deadline" />

  <button type="submit">Assign Task</button>
</form>

<h3>Create Student</h3>

<form id="studentForm">
  <input type="text" id="s_name" placeholder="Name" required />
  <input type="email" id="s_email" placeholder="Email" required />
  <input type="text" id="s_class" placeholder="Class" />
  <input type="text" id="s_subject" placeholder="Subject" />
  <input type="password" id="s_password" placeholder="Password" required />

  <button type="submit">Create Student</button>
</form>

<h3>Student Submissions</h3>

<div style="margin-bottom:15px;">
    <button onclick="showSubmissionSection('unmarked')">📝 Unmarked Works</button>
    <button onclick="showSubmissionSection('marked')">✅ Marked Works</button>
</div>

<div id="unmarkedList"></div>
<div id="markedList" style="display:none;"></div>

</div>

<script src="script.js"></script>

<script>
function logout() {
    localStorage.clear();
    window.location.href = "index.html";
}

window.onload = function () {
    loadSubmissions();
    showSubmissionSection('unmarked'); // default
};
</script>

</body>
</html>
