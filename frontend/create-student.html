<!DOCTYPE html>
<html>
<head>
    <title>Create Student</title>
</head>
<body>

<h2>➕ Create Student (Teacher Only)</h2>

<form id="studentForm">

    <input type="text" id="name" placeholder="Name" required><br><br>

    <input type="email" id="email" placeholder="Email" required><br><br>

    <input type="text" id="class" placeholder="Class" required><br><br>

    <input type="text" id="subject" placeholder="Subject" required><br><br>

    <input type="password" id="password" placeholder="Password" required><br><br>

    <button type="submit">Save Student</button>

</form>

<script>
document.getElementById("studentForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const token = localStorage.getItem("token");

    const res = await fetch("http://localhost:3000/teacherStudent/create-student", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify({
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            class: document.getElementById("class").value,
            subject: document.getElementById("subject").value,
            password: document.getElementById("password").value
        })
    });

    const data = await res.json();

    alert(data.message);

    if (data.success) {
        window.location.href = "dashboard.html";
    }
});
</script>

</body>
</html>
