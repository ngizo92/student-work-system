<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student Login</title>

<style>
/* (your styles unchanged) */
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    background: linear-gradient(-45deg, #ff6a00, #ee0979, #ffb347, #ffcc33);
    background-size: 400% 400%;
    animation: gradient 10s ease infinite;
}

@keyframes gradient {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

.card {
    width: 350px;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    text-align: center;
    color: white;
}

h2 {
    margin-bottom: 20px;
}

input {
    width: 90%;
    padding: 12px;
    margin: 10px 0;
    border: none;
    border-radius: 10px;
    outline: none;
}

button {
    width: 95%;
    padding: 12px;
    margin-top: 15px;
    border: none;
    border-radius: 10px;
    background: #fff;
    color: #333;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    background: #000;
    color: white;
}
</style>
</head>

<body>

<div class="card">
    <h2>👨‍🎓 Student Login</h2>

    <input id="email" placeholder="Enter Email">

    <!-- ✅ PASSWORD WITH TOGGLE -->
    <div style="position: relative;">
        <input id="password" type="password" placeholder="Enter Password" minlength="4">
        <span onclick="togglePassword()" 
              style="position:absolute; right:15px; top:12px; cursor:pointer;">
              👁
        </span>
    </div>

    <button onclick="login()">Login</button>
</div>

<script>
    const API = "http://localhost:5000";
fetch("http://localhost:5000/student-login")// unchanged

// ✅ PASSWORD TOGGLE
function togglePassword() {
    const pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
}

async function login() {

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    // ✅ VALIDATION
    if (!email || !password) {
        alert("Fill all fields");
        return;
    }

    if (!email.includes("@")) {
        alert("Enter a valid email");
        return;
    }

    if (password.length < 4) {
        alert("Password must be at least 4 characters");
        return;
    }

    try {
        const res = await fetch(`${API}/student-login`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (data.success) {

            localStorage.setItem("token", data.token || "");
            localStorage.setItem("userRole", "student");
            localStorage.setItem("student", JSON.stringify(data.student));

            window.location.href = "student-dashboard.html";

        } else {
            alert(data.message || "Login failed");
        }

    } catch (err) {
        console.log(err);
        alert("Server not running or wrong API");
    }

}
</script>
</body>
</html>
